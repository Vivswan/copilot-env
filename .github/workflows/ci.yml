name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  commit-names:
    name: conventional-commits
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Validate commit subjects
        run: node .github/scripts/validate-commit-names.cjs

  check:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          HUSKY: "0"

      # Guard the postinstall proxy float: `bun install` above runs
      # src/proxy_float.ts as its postinstall, which is best-effort (never
      # fails the install). Without this check a silently broken float would slip
      # through CI, since the start/stop lifecycle below uses a FAKE proxy
      # (COPILOT_API_ENTRY) and never resolves the real one. This asserts the
      # float actually installed @jeffreycao/copilot-api within config bounds, on every OS.
      - name: Verify proxy float installed the proxy
        run: bun src/proxy_float.ts --assert-installed

      - name: Typecheck
        if: runner.os == 'Linux'
        run: bun run typecheck

      - name: Lint + format (biome check)
        if: runner.os == 'Linux'
        run: bun run lint

      - name: Test
        run: bun test --timeout 15000

      # End-to-end daemon lifecycle on every OS: process.ts spawns a detached
      # daemon, `start` waits for it to listen + syncs aliases, `stop` verifies
      # the tracked pid is ours and signals it. `health --scope runtime` is the
      # cross-check: it must pass (exit 0) while the daemon is up and fail (exit
      # 1) once it's down, so start/stop and the runtime probe verify each other.
      # COPILOT_API_ENTRY points at a fake proxy so no Copilot auth is needed.
      # `shell: bash` runs on the Windows runner too (git-bash); -e is on, so any
      # unexpected non-zero (and the inverted post-stop check) fails the step.
      - name: Start/stop + health lifecycle (fake proxy)
        shell: bash
        env:
          COPILOT_API_ENTRY: ${{ github.workspace }}/test/copilot-api-fake.mjs
        run: |
          bun src/cli.ts start
          bun src/cli.ts health --scope runtime
          # Managed-lifecycle idempotency (auto-start on): a redundant `start` is a no-op -- it must
          # keep the SAME daemon pid (not restart and disrupt a connected agent); `--force` launches
          # a fresh daemon (new pid). In the default/unmanaged mode `start` still restarts. Capture
          # `start` output (so a nonzero exit fails the step, not just grep) and compare pids.
          readpid() { bun -e 'import {CopilotEnvRunState} from "./src/copilot_api/state.ts"; process.stdout.write(String(new CopilotEnvRunState().read().pid))'; }
          bun src/cli.ts config --set auto-start true
          pid_before=$(readpid)
          out=$(bun src/cli.ts start)
          echo "$out" | grep -q "already running" || { echo "::error::managed redundant start did not no-op on ${{ runner.os }}"; exit 1; }
          pid_after=$(readpid)
          [ "$pid_before" = "$pid_after" ] || { echo "::error::managed redundant start changed the pid ($pid_before -> $pid_after) on ${{ runner.os }}"; exit 1; }
          bun src/cli.ts health --scope runtime
          bun src/cli.ts start --force
          pid_forced=$(readpid)
          [ "$pid_after" != "$pid_forced" ] || { echo "::error::start --force did not relaunch a fresh daemon on ${{ runner.os }}"; exit 1; }
          bun src/cli.ts health --scope runtime
          bun src/cli.ts config --del auto-start
          bun src/cli.ts codex --proxy
          bun src/cli.ts claude --proxy
          bun src/cli.ts health --scope setup
          echo "health OK while running on ${{ runner.os }}"
          bun src/cli.ts stop
          if bun src/cli.ts health --scope runtime; then
            echo "::error::health reported healthy after stop on ${{ runner.os }}"
            exit 1
          fi
          echo "start/stop + health OK on ${{ runner.os }}"

      - name: Shell lint (shellcheck)
        if: runner.os == 'Linux'
        run: bun run lint:sh

      - name: PowerShell lint (PSScriptAnalyzer)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (-not (Get-PSRepository -Name PSGallery -ErrorAction SilentlyContinue)) {
            Register-PSRepository -Default
          }
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module PSScriptAnalyzer -Force -Scope CurrentUser -SkipPublisherCheck
          bun run lint:ps

  # Each install.sh scenario runs as its OWN isolated job (fresh runner, fresh
  # $HOME) via the reusable installer-sh.yml. The default bootstrap path runs on
  # both Linux and macOS; optional setup variants run on one POSIX OS because the
  # detailed block/flag behavior is covered by unit tests.
  install-sh:
    name: install.sh ${{ matrix.name }} / ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, name: "default", args: "", setup-clis: false, setup-launchers: false, expect-clis: false, expect-wiring: true, rerun: true }
          - { os: macos-latest, name: "default", args: "", setup-clis: false, setup-launchers: false, expect-clis: false, expect-wiring: true, rerun: true }
          - { os: ubuntu-latest, name: "download path", args: "--no-shell-integration", setup-clis: false, setup-launchers: false, expect-clis: false, expect-wiring: false, rerun: true, download-install: true }
          - { os: ubuntu-latest, name: "setup-clis", args: "", setup-clis: true, setup-launchers: false, expect-clis: true, expect-wiring: true, rerun: false }
          - { os: ubuntu-latest, name: "setup-launchers", args: "", setup-clis: false, setup-launchers: true, expect-clis: false, expect-wiring: true, rerun: false }
          - { os: ubuntu-latest, name: "--no-shell-integration", args: "--no-shell-integration", setup-clis: false, setup-launchers: false, expect-clis: false, expect-wiring: false, rerun: false }
    uses: ./.github/workflows/installer-sh.yml
    with:
      os: ${{ matrix.os }}
      args: ${{ matrix.args }}
      setup-clis: ${{ matrix.setup-clis }}
      setup-launchers: ${{ matrix.setup-launchers }}
      expect-clis: ${{ matrix.expect-clis }}
      expect-wiring: ${{ matrix.expect-wiring }}
      rerun: ${{ matrix.rerun }}
      download-install: ${{ matrix.download-install || false }}

  # Windows parity: each install.ps1 scenario as its OWN isolated job via the
  # reusable installer-ps1.yml. Git + Node/npm are preinstalled on windows-latest.
  #   default / setup-clis / no-shell-integration : bun provided by setup-bun,
  #     exercising checkout detection, profile wiring, and moved setup paths.
  install-ps1:
    name: install.ps1 ${{ matrix.scenario.name }}
    strategy:
      fail-fast: false
      matrix:
        scenario:
          - { name: "default", args: "", setup-clis: false, setup-launchers: false, expect-clis: false, expect-wiring: true, rerun: true }
          - { name: "download path", args: "-NoShellIntegration", setup-clis: false, setup-launchers: false, expect-clis: false, expect-wiring: false, rerun: true, download-install: true }
          - { name: "setup-clis", args: "", setup-clis: true, setup-launchers: false, expect-clis: true, expect-wiring: true, rerun: false }
          - { name: "-NoShellIntegration", args: "-NoShellIntegration", setup-clis: false, setup-launchers: false, expect-clis: false, expect-wiring: false, rerun: false }
    uses: ./.github/workflows/installer-ps1.yml
    with:
      args: ${{ matrix.scenario.args }}
      setup-clis: ${{ matrix.scenario.setup-clis }}
      setup-launchers: ${{ matrix.scenario.setup-launchers }}
      expect-clis: ${{ matrix.scenario.expect-clis }}
      expect-wiring: ${{ matrix.scenario.expect-wiring }}
      rerun: ${{ matrix.scenario.rerun }}
      download-install: ${{ matrix.scenario.download-install || false }}

  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: raven-actions/actionlint@v2

  # Pre-merge release smoke, exercised on the rolling release-please PR ONLY:
  # simulate the pending release from the working tree (pin the installers,
  # git-archive HEAD, serve a localhost stand-in of the GitHub releases API) and
  # run the full installer against it on both platforms. Catches packaging and
  # installer bugs BEFORE the tag exists; the post-release smoke in
  # release-please.yml still gates publishing with the real uploaded assets.
  # The job itself always runs and the release-PR condition lives on the STEPS,
  # so everywhere else it is a seconds-long no-op reporting success -- keeping
  # all-green's strict `join(needs.*.result)` gate free of skip carve-outs.
  release-pr-smoke:
    name: release-pr smoke / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    env:
      # A same-repo PR from release-please's branch namespace. The head-repo check
      # matters: a fork can name its branch release-please--anything, and the
      # release-please-branches ruleset (.github/settings.yml) only reserves the
      # namespace inside THIS repo.
      IS_RELEASE_PR: ${{ github.event_name == 'pull_request' && startsWith(github.head_ref, 'release-please--') && github.event.pull_request.head.repo.full_name == github.repository }}
    steps:
      - uses: actions/checkout@v7
        if: ${{ env.IS_RELEASE_PR == 'true' }}

      - uses: oven-sh/setup-bun@v2
        if: ${{ env.IS_RELEASE_PR == 'true' }}
        with:
          bun-version: 1.3.14

      - name: Simulate the pending release and run the installer against it
        if: ${{ env.IS_RELEASE_PR == 'true' }}
        run: node .github/scripts/release-pr-smoke.cjs

  # Single aggregate gate: this is the ONLY CI context branch protection requires,
  # so adding/renaming matrix jobs never desyncs .github/settings.yml. Runs always
  # and fails unless every needed job succeeded (a matrix job's result is success
  # only if all its combinations passed).
  all-green:
    name: all-green
    if: always()
    needs: [commit-names, check, install-sh, install-ps1, actionlint, release-pr-smoke]
    runs-on: ubuntu-latest
    steps:
      - name: Require all CI jobs to have succeeded
        run: |
          results="${{ join(needs.*.result, ',') }}"
          echo "needs results: $results"
          case ",$results," in
            *,failure,* | *,cancelled,* | *,skipped,*)
              echo "::error::a required CI job did not succeed ($results)"; exit 1 ;;
          esac
          echo "all required CI jobs succeeded"

  release-please:
    name: release-please
    needs: all-green
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    uses: ./.github/workflows/release-please.yml
    permissions:
      contents: write
      pull-requests: write
      issues: write
    secrets: inherit
