name: release-please

# Versioned GitHub releases from Conventional Commits. On every push to main,
# release-please opens/updates ONE rolling "release PR" that bumps the version
# (semver derived from feat:/fix:/feat!: prefixes) and regenerates CHANGELOG.md.
# Merging that PR is what tags vX.Y.Z + publishes the GitHub Release -- a plain
# push to main releases nothing.
on:
  push:
    branches: [main]

permissions:
  actions: read         # wait for the existing CI workflow before publishing
  contents: write       # create the tag + release, push the changelog/version bump
  pull-requests: write  # open/update the release PR
  issues: write         # release-please's `autorelease:` labels (label = issues API)

# Two concurrent passes would race on the release PR; serialize them.
concurrency:
  group: release-please
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v6

      - name: Create installer assets
        id: installer-assets
        run: |
          tag="v$(node -p "require('./package.json').version")"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          node .github/scripts/release-assets.cjs prepare "$tag"

      - name: Validate installer assets
        env:
          TAG: ${{ steps.installer-assets.outputs.tag }}
        run: |
          node .github/scripts/release-assets.cjs validate "$TAG"
          bash -n release-assets/install.sh
          pwsh -NoProfile -Command "[scriptblock]::Create((Get-Content -Raw release-assets/install.ps1)) | Out-Null"

      # release-please opens/updates the rolling release PR. It is created with
      # RELEASE_PLEASE_TOKEN (a PAT or GitHub App token) when that secret is set, so
      # GitHub runs CI on the release PR like a normal PR. PRs opened by the built-in
      # GITHUB_TOKEN never trigger workflows (a recursion guard) -- that is why the
      # required `all-green` check used to sit unmet on the release PR. Falls back to
      # GITHUB_TOKEN when the secret is absent: the release PR still opens, but CI
      # won't run on it (admin-merge) until you add the token. See AGENTS.md > Releases.
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Create release archive asset
        if: ${{ steps.release.outputs.release_created == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.release.outputs.tag_name }}
        run: |
          node .github/scripts/release-assets.cjs create-archive "$TAG" "${{ github.repository }}"
          node .github/scripts/release-assets.cjs validate "$TAG"

      - name: Upload installer assets
        if: ${{ steps.release.outputs.release_created == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.release.outputs.tag_name }}
          PREPARED_TAG: ${{ steps.installer-assets.outputs.tag }}
        run: |
          if [ "$PREPARED_TAG" != "$TAG" ]; then
            echo "::error::prepared installer assets are for $PREPARED_TAG, but release-please created $TAG"
            exit 1
          fi
          gh release upload "$TAG" \
            release-assets/install.sh \
            release-assets/install.sh.sha256 \
            release-assets/install.ps1 \
            release-assets/install.ps1.sha256 \
            "release-assets/copilot-env-$TAG.tar.gz" \
            "release-assets/copilot-env-$TAG.tar.gz.sha256" \
            --clobber

  release-installer-smoke-linux:
    name: release install.sh smoke
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Smoke uploaded install.sh asset
        timeout-minutes: 20
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          COPILOT_ENV_CI_INCLUDE_DRAFT_RELEASES: "1"
        run: node .github/scripts/release-installer-smoke.cjs "${{ needs.release-please.outputs.tag_name }}" "${{ github.repository }}"

  release-installer-smoke-windows:
    name: release install.ps1 smoke
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Smoke uploaded install.ps1 asset
        timeout-minutes: 20
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          COPILOT_ENV_CI_INCLUDE_DRAFT_RELEASES: "1"
        run: node .github/scripts/release-installer-smoke.cjs "${{ needs.release-please.outputs.tag_name }}" "${{ github.repository }}"

  wait-for-ci:
    name: wait for CI / all-green
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Wait for existing CI workflow
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          deadline=$((SECONDS + 50 * 60))
          run_id=""
          while [ "$SECONDS" -lt "$deadline" ]; do
            run_id="$(gh run list \
              --repo "$REPO" \
              --workflow CI \
              --commit "$SHA" \
              --json databaseId,event \
              --jq 'map(select(.event == "push")) | sort_by(.databaseId) | last | .databaseId // ""')"
            if [ -n "$run_id" ]; then
              break
            fi
            echo "Waiting for CI workflow run for $SHA ..."
            sleep 10
          done

          if [ -z "$run_id" ]; then
            echo "::error::CI workflow run for $SHA was not found."
            exit 1
          fi

          echo "Waiting for CI workflow run $run_id ..."
          gh run watch "$run_id" --repo "$REPO" --exit-status --interval 10

          all_green="$(gh run view "$run_id" \
            --repo "$REPO" \
            --json jobs \
            --jq '.jobs[] | select(.name == "all-green") | .conclusion')"
          if [ "$all_green" != "success" ]; then
            echo "::error::CI all-green did not succeed (conclusion: ${all_green:-missing})."
            exit 1
          fi
          echo "CI all-green succeeded."

  publish-release:
    name: publish release
    needs:
      - release-please
      - release-installer-smoke-linux
      - release-installer-smoke-windows
      - wait-for-ci
    if: >-
      ${{
        needs.release-please.outputs.release_created == 'true' &&
        needs.release-installer-smoke-linux.result == 'success' &&
        needs.release-installer-smoke-windows.result == 'success' &&
        needs.wait-for-ci.result == 'success'
      }}
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: gh release edit "$TAG" --repo "${{ github.repository }}" --draft=false --latest
