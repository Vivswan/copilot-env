name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          HUSKY: "0"

      - name: Typecheck
        run: bun run typecheck

      - name: Lint (biome)
        run: bun run lint

      - name: Test
        run: bun test

      - name: Shell lint (shellcheck)
        if: runner.os == 'Linux'
        run: bun run lint:shell

      - name: PowerShell lint (PSScriptAnalyzer)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Install-Module PSScriptAnalyzer -Force -Scope CurrentUser -SkipPublisherCheck
          bun run lint:ps

  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: raven-actions/actionlint@v2

  # Exercises the real Windows daemon lifecycle -- the one thing that can't be
  # reasoned about statically: whether bun's detached spawn keeps the daemon
  # alive after the launcher exits. `start` only exits 0 if the daemon is still
  # alive ~1s later, so a green run proves detached-spawn survival on Windows.
  # Informational for now (continue-on-error, not a required check) because the
  # gateway may need GitHub Copilot auth that CI can't provide; promote it to a
  # required check once it proves stable.
  windows-start-stop:
    name: windows start/stop (smoke)
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Launch via the PowerShell launcher, verify the daemon survives, then stop it
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File bin\copilot-api.ps1 start
          if ($LASTEXITCODE -ne 0) { Write-Error 'start failed: the detached daemon did not survive ~1s'; exit 1 }
          powershell -ExecutionPolicy Bypass -File bin\copilot-api.ps1 stop
          if ($LASTEXITCODE -ne 0) { Write-Error 'stop failed'; exit 1 }
          Write-Host 'start/stop OK on Windows'
