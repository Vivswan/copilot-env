version: 2
updates:
  # Keep the GitHub Actions used by CI / auto-assign current.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    labels:
      - dependencies

  # bun deps (Dependabot supports the bun ecosystem as of 2025-02-13 GA). The
  # committed bun.lock pins everything except @jeffreycao/copilot-api, which
  # floats at runtime via floatGateway (setup_dependencies.ts) -- so it is ignored here.
  # cooldown mirrors bunfig.toml's 7-day minimumReleaseAge supply-chain wait.
  - package-ecosystem: bun
    directory: "/"
    schedule:
      interval: monthly
    labels:
      - dependencies
    cooldown:
      default-days: 7
    ignore:
      - dependency-name: "@jeffreycao/copilot-api"
