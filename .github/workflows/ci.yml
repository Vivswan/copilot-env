name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          HUSKY: "0"

      # Guard the postinstall gateway float: `bun install` above runs
      # src/gateway_float.ts as its postinstall, which is best-effort (never
      # fails the install). Without this check a silently broken float would slip
      # through CI, since the start/stop lifecycle below uses a FAKE gateway
      # (COPILOT_API_ENTRY) and never resolves the real one. This asserts the
      # float actually installed @jeffreycao/copilot-api >= the floor, on every OS.
      - name: Verify gateway float installed the gateway (>= floor)
        run: bun scripts/verify-gateway-install.ts

      - name: Typecheck
        run: bun run typecheck

      - name: Lint + format (biome check)
        run: bun run lint

      - name: Test
        run: bun test

      # End-to-end daemon lifecycle on every OS: process.ts spawns a detached
      # daemon, `start` waits for it to listen + syncs aliases, `stop` verifies
      # the tracked pid is ours and signals it. COPILOT_API_ENTRY points at a
      # fake gateway so no Copilot auth is needed. `shell: bash` runs on the
      # Windows runner too (git-bash), and a non-zero start/stop fails the step.
      - name: Start/stop lifecycle (fake gateway)
        shell: bash
        env:
          COPILOT_API_ENTRY: ${{ github.workspace }}/test/copilot-api-fake.mjs
        run: |
          bun src/cli.ts start
          bun src/cli.ts stop
          echo "start/stop OK on ${{ runner.os }}"

      - name: Shell lint (shellcheck)
        if: runner.os == 'Linux'
        run: bun run lint:sh

      - name: PowerShell lint (PSScriptAnalyzer)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (-not (Get-PSRepository -Name PSGallery -ErrorAction SilentlyContinue)) {
            Register-PSRepository -Default
          }
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module PSScriptAnalyzer -Force -Scope CurrentUser -SkipPublisherCheck
          bun run lint:ps

  # Each install.sh scenario runs as its OWN isolated job (fresh runner, fresh
  # $HOME) via the reusable installer-sh.yml -- they can never interfere with one
  # another. Runs from the checkout, so it exercises THIS commit, not origin/main.
  #   full   : end-to-end install (nvm+Node, bun, the three cooldown-pinned CLIs,
  #            rc wiring). bun is installed BY the installer (provision-bun: false).
  #   no-prereqs    : verify-only; bun must be pre-present (provision-bun: true) and
  #                   the installer installs nothing (expect-clis: false).
  #   local-install : no-sudo path on a bare runner -- bun via curl, Node via nvm,
  #                   CLIs via npm, never a system package manager.
  #   no-shell-integration : full install minus rc wiring (expect-wiring: false).
  install-sh:
    name: install.sh ${{ matrix.scenario.name }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        scenario:
          - { name: "full (--cooldown)", args: "--cooldown", provision-bun: false, expect-clis: true, expect-wiring: true, rerun: false }
          - { name: "--no-prereqs", args: "--no-prereqs", provision-bun: true, expect-clis: false, expect-wiring: true, rerun: false }
          - { name: "--local-install", args: "--local-install", provision-bun: false, expect-clis: true, expect-wiring: true, rerun: true }
          - { name: "--no-shell-integration", args: "--no-shell-integration", provision-bun: false, expect-clis: true, expect-wiring: false, rerun: false }
    uses: ./.github/workflows/installer-sh.yml
    with:
      os: ${{ matrix.os }}
      args: ${{ matrix.scenario.args }}
      provision-bun: ${{ matrix.scenario.provision-bun }}
      expect-clis: ${{ matrix.scenario.expect-clis }}
      expect-wiring: ${{ matrix.scenario.expect-wiring }}
      rerun: ${{ matrix.scenario.rerun }}

  # Windows parity: each install.ps1 scenario as its OWN isolated job via the
  # reusable installer-ps1.yml. Git + Node/npm are preinstalled on windows-latest.
  #   full / no-prereqs / no-shell-integration : bun provided by setup-bun
  #     (winget is unreliable in CI), exercising clone detection, the -Cooldown
  #     agent-CLI resolver, the npm CLI install, and the profile wiring (or its
  #     deliberate absence).
  #   local-install (no-winget) : all prereqs present, -LocalInstall must use none.
  #   local-install (irm bun)   : bun ABSENT (no setup-bun) so -LocalInstall must
  #     install it user-locally via irm, never winget (expect-bun-local: true).
  install-ps1:
    name: install.ps1 ${{ matrix.scenario.name }}
    strategy:
      fail-fast: false
      matrix:
        scenario:
          - { name: "full (-Cooldown)", args: "-Cooldown", provision-bun: true, expect-clis: true, expect-wiring: true, expect-bun-local: false, rerun: false }
          - { name: "-NoPrereqs", args: "-NoPrereqs", provision-bun: true, expect-clis: false, expect-wiring: true, expect-bun-local: false, rerun: false }
          - { name: "-LocalInstall (no-winget)", args: "-LocalInstall", provision-bun: true, expect-clis: true, expect-wiring: true, expect-bun-local: false, rerun: true }
          - { name: "-LocalInstall (irm bun)", args: "-LocalInstall", provision-bun: false, expect-clis: true, expect-wiring: true, expect-bun-local: true, rerun: true }
          - { name: "-NoShellIntegration", args: "-NoShellIntegration", provision-bun: true, expect-clis: true, expect-wiring: false, expect-bun-local: false, rerun: false }
    uses: ./.github/workflows/installer-ps1.yml
    with:
      args: ${{ matrix.scenario.args }}
      provision-bun: ${{ matrix.scenario.provision-bun }}
      expect-clis: ${{ matrix.scenario.expect-clis }}
      expect-wiring: ${{ matrix.scenario.expect-wiring }}
      expect-bun-local: ${{ matrix.scenario.expect-bun-local }}
      rerun: ${{ matrix.scenario.rerun }}

  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: raven-actions/actionlint@v2
