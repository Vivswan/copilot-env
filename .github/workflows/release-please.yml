name: release-please

# Versioned GitHub releases from Conventional Commits. On every push to main,
# release-please opens/updates ONE rolling "release PR" that bumps the version
# (semver derived from feat:/fix:/feat!: prefixes) and regenerates CHANGELOG.md.
# Merging that PR is what tags vX.Y.Z + publishes the GitHub Release -- a plain
# push to main releases nothing.
on:
  push:
    branches: [main]

permissions:
  contents: write       # create the tag + release, push the changelog/version bump
  pull-requests: write  # open/update the release PR
  issues: write         # release-please's `autorelease:` labels (label = issues API)

# Two concurrent passes would race on the release PR; serialize them.
concurrency:
  group: release-please
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      # Reads release-please-config.json + .release-please-manifest.json at the repo
      # root. Uses the default GITHUB_TOKEN -- GitHub may not run CI on the release
      # PR it opens, or may hold the run pending manual approval, so the required
      # `all-green` check can sit unmet. The release PR only bumps version +
      # changelog (the code already passed CI merging into main), so merge it with
      # admin bypass / approve the run -- or set `token:` to a PAT or GitHub App
      # token here to run CI on the release PR normally.
      - uses: googleapis/release-please-action@v4
