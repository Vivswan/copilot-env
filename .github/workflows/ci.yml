name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          HUSKY: "0"

      - name: Typecheck
        run: bun run typecheck

      - name: Lint (biome)
        run: bun run lint

      - name: Test
        run: bun test

      # End-to-end daemon lifecycle on every OS: process.ts spawns a detached
      # daemon, `start` waits for it to listen + syncs aliases, `stop` verifies
      # the tracked pid is ours and signals it. COPILOT_API_ENTRY points at a
      # fake gateway so no Copilot auth is needed. `shell: bash` runs on the
      # Windows runner too (git-bash), and a non-zero start/stop fails the step.
      - name: Start/stop lifecycle (fake gateway)
        shell: bash
        env:
          COPILOT_API_ENTRY: ${{ github.workspace }}/test/copilot-api-fake.mjs
        run: |
          bun src/cli.ts start
          bun src/cli.ts stop
          echo "start/stop OK on ${{ runner.os }}"

      - name: Shell lint (shellcheck)
        if: runner.os == 'Linux'
        run: bun run lint:sh

      - name: PowerShell lint (PSScriptAnalyzer)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (-not (Get-PSRepository -Name PSGallery -ErrorAction SilentlyContinue)) {
            Register-PSRepository -Default
          }
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module PSScriptAnalyzer -Force -Scope CurrentUser -SkipPublisherCheck
          bun run lint:ps

  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: raven-actions/actionlint@v2
