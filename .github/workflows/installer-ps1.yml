name: installer-ps1 smoke

# Reusable, single-scenario install.ps1 smoke (Windows). The caller (ci.yml)
# invokes this once per flag combination, so each scenario runs as its OWN job on
# a fresh runner -- separate profile, separate $HOME. Scenarios can never share or
# clobber each other's state, so expect-wiring=false asserts the absence of
# profile wiring directly (a fresh profile has none to begin with).
on:
  workflow_call:
    inputs:
      args:
        description: Flag(s) to pass to install.ps1 (for example "-NoShellIntegration").
        required: true
        type: string
      provision-bun:
        description: >-
          true installs bun via setup-bun before running; false lets the installer
          install bun via bun.sh.
        type: boolean
        default: true
      expect-clis:
        description: true asserts the agent CLIs (claude/copilot/codex) are installed after optional setup; false asserts they are absent.
        type: boolean
        default: false
      setup-clis:
        description: true runs `agent setup clis --cooldown` after install.
        type: boolean
        default: false
      setup-launchers:
        description: true runs `agent setup launchers` after install.
        type: boolean
        default: false
      expect-wiring:
        description: true asserts the profile wiring is present; false asserts it is absent.
        type: boolean
        default: true
      expect-bun-local:
        description: true asserts bun was installed user-locally (%USERPROFILE%\.bun). Also pre-asserts bun is ABSENT before install so the check is not vacuous.
        type: boolean
        default: false
      rerun:
        description: >-
          true runs install.ps1 a SECOND time after the first, exercising the
          repeat install path (must still exit 0).
          Same flag, same job -- no cross-scenario interference.
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  smoke:
    name: windows-latest
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - if: ${{ inputs.provision-bun }}
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      # For bun.sh scenarios bun must be ABSENT going in, or the post-run user-local
      # assertion is vacuous (e.g. a future runner image ships bun).
      - name: Assert bun absent before install
        if: ${{ inputs.expect-bun-local }}
        shell: pwsh
        run: |
          if (Get-Command bun -ErrorAction SilentlyContinue) {
            Write-Error "::error::bun is already on PATH before install; the user-local irm assertion would be vacuous"; exit 1
          }
          $bunExe = Join-Path $env:USERPROFILE '.bun\bin\bun.exe'
          if (Test-Path $bunExe) {
            Write-Error "::error::bun already present at $bunExe before install; the user-local irm assertion would be vacuous"; exit 1
          }
          Write-Host 'confirmed bun absent before install'

      - name: Run install.ps1 ${{ inputs.args }}
        shell: pwsh
        run: |
          ./install.ps1 ${{ inputs.args }}
          if ('${{ inputs.rerun }}' -eq 'true') {
            Write-Host '--- repeat install run (must still succeed) ---'
            ./install.ps1 ${{ inputs.args }}
          }

      - name: Assert installer did not install optional CLIs
        shell: pwsh
        run: |
          foreach ($cli in 'claude', 'copilot', 'codex') {
            if (Get-Command $cli -ErrorAction SilentlyContinue) {
              Write-Error "::error::$cli must NOT be installed by install.ps1 ${{ inputs.args }}"; exit 1
            }
            Write-Host "$cli correctly absent after installer"
          }

      - name: Run agent setup clis
        if: ${{ inputs.setup-clis }}
        shell: pwsh
        run: ./bin/agent.ps1 setup clis --cooldown

      - name: Run agent setup launchers
        if: ${{ inputs.setup-launchers }}
        shell: pwsh
        run: ./bin/agent.ps1 setup launchers

      - name: Verify install.ps1 outcome
        shell: pwsh
        run: |
          # npm may be absent unless `agent setup clis` ran: probe the npm global
          # bin only when npm exists, otherwise rely on Get-Command.
          $bin = $null
          if (Get-Command npm.cmd -ErrorAction SilentlyContinue) {
            $bin = (& npm.cmd prefix -g).Trim()
          }
          foreach ($cli in 'claude', 'copilot', 'codex') {
            $found = [bool](Get-Command $cli -ErrorAction SilentlyContinue)
            if (-not $found -and $bin) {
              $found = (Test-Path (Join-Path $bin "$cli.cmd")) -or (Test-Path (Join-Path $bin $cli))
            }
            if ('${{ inputs.expect-clis }}' -eq 'true') {
              if (-not $found) { Write-Error "::error::$cli was not installed by agent setup clis"; exit 1 }
              Write-Host "found $cli"
            } else {
              if ($found) { Write-Error "::error::$cli must NOT have been installed without agent setup clis"; exit 1 }
              Write-Host "$cli correctly absent"
            }
          }
          $docs = [Environment]::GetFolderPath('MyDocuments')
          $profiles = @(
            (Join-Path $docs 'WindowsPowerShell\Microsoft.PowerShell_profile.ps1')
            (Join-Path $docs 'PowerShell\Microsoft.PowerShell_profile.ps1')
          )
          # install.ps1 keys its own "already wired" check on the agents.ps1 marker,
          # so the test asserts on the same marker the installer itself uses.
          $wired = [bool]($profiles | Where-Object { (Test-Path $_) -and (Select-String -Path $_ -SimpleMatch 'agents.ps1' -Quiet) })
          if ('${{ inputs.expect-wiring }}' -eq 'true') {
            if (-not $wired) { Write-Error "::error::expected profile wiring, but none found"; exit 1 }
          } else {
            if ($wired) { Write-Error "::error::expected NO profile wiring (${{ inputs.args }}), but a profile was wired"; exit 1 }
          }
          if ('${{ inputs.expect-bun-local }}' -eq 'true') {
            $bunExe = Join-Path $env:USERPROFILE '.bun\bin\bun.exe'
            if (-not (Test-Path $bunExe)) { Write-Error "::error::installer did not install bun via bun.sh ($bunExe missing)"; exit 1 }
            Write-Host "bun installed user-locally at $bunExe"
          }
          if ('${{ inputs.setup-launchers }}' -eq 'true') {
            $launcherWired = [bool]($profiles | Where-Object { (Test-Path $_) -and (Select-String -Path $_ -SimpleMatch 'agents.launchers.ps1' -Quiet) })
            if (-not $launcherWired) { Write-Error "::error::expected launcher wiring, but none found"; exit 1 }
          }
          Write-Host "install.ps1 ${{ inputs.args }} verified"
