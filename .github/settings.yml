# Repository settings managed by the Probot "Settings" GitHub App
# (https://github.com/apps/settings). This file is inert unless that app is
# installed on the repo. The `rulesets` block below is an experimental upstream
# feature (repository-settings/app) -- its schema may still change.

repository:
  description: Local copilot-api gateway lifecycle + config helper (TypeScript).
  homepage: https://github.com/Vivswan/copilot-env
  topics: copilot, copilot-api, cli, bun, typescript, gateway, claude-code, codex
  has_issues: true
  has_wiki: false
  has_projects: false
  has_discussions: false
  default_branch: main
  allow_squash_merge: true
  allow_merge_commit: false
  allow_rebase_merge: false
  delete_branch_on_merge: true
  allow_auto_merge: true

labels:
  - name: dependencies
    color: "0366d6"
    description: Dependency updates
  - name: bug
    color: "d73a4a"
    description: Something isn't working
  - name: enhancement
    color: "a2eeef"
    description: New feature or request
  - name: fix-lint
    color: "fbca04"
    description: Lint / formatting fixes

# Branch ruleset for the default branch. Admins (RepositoryRole id 5) are in the
# bypass list, so direct pushes to main still work. Two newer rules -- "require
# code quality results" and "automatically request Copilot review" -- aren't
# expressible here yet; add those in the UI (Settings -> Rules -> Rulesets).
rulesets:
  - name: main
    target: branch
    enforcement: active
    conditions:
      ref_name:
        include:
          - "~DEFAULT_BRANCH"
        exclude: []
    rules:
      - type: deletion
      - type: non_fast_forward
      - type: required_status_checks
        parameters:
          strict_required_status_checks_policy: false
          do_not_enforce_on_create: true
          required_status_checks:
            - context: ubuntu-latest
            - context: macos-latest
            - context: windows-latest
            - context: actionlint
      - type: code_scanning
        parameters:
          code_scanning_tools:
            - tool: CodeQL
              security_alerts_threshold: high_or_higher
              alerts_threshold: errors
    bypass_actors:
      - actor_id: 5
        actor_type: RepositoryRole
        bypass_mode: always
