name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          HUSKY: "0"

      - name: Typecheck
        run: bun run typecheck

      - name: Lint (biome)
        run: bun run lint

      - name: Test
        run: bun test

      - name: Shell lint (shellcheck)
        if: runner.os == 'Linux'
        run: bun run lint:shell

      - name: PowerShell lint (PSScriptAnalyzer)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Install-Module PSScriptAnalyzer -Force -Scope CurrentUser -SkipPublisherCheck
          bun run lint:ps

  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: raven-actions/actionlint@v2

  # Exercises whether bun's detached spawn keeps the daemon alive on Windows
  # (the one thing that can't be reasoned about statically). Runs server.ts
  # directly against root node_modules -- NOT via the bin/cache shim, which on
  # Windows resolves the junction-mirrored src back to the source tree and can't
  # find the cache's node_modules. `start` only exits 0 if the daemon is still
  # alive ~1s later, so a green run proves detached-spawn survival. Informational
  # (continue-on-error) -- the gateway may need Copilot auth CI can't provide.
  windows-start-stop:
    name: windows start/stop (smoke)
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          HUSKY: "0"
      - name: Start the daemon, verify it survives, then stop it
        shell: pwsh
        run: |
          bun src/server.ts start
          if ($LASTEXITCODE -ne 0) { Write-Error 'start failed: the detached daemon did not survive ~1s'; exit 1 }
          bun src/server.ts stop
          if ($LASTEXITCODE -ne 0) { Write-Error 'stop failed'; exit 1 }
          Write-Host 'start/stop OK on Windows'
