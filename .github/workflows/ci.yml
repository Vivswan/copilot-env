name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          HUSKY: "0"

      - name: Typecheck
        run: bun run typecheck

      - name: Lint (biome)
        run: bun run lint

      - name: Test
        run: bun test

      - name: Shell lint (shellcheck)
        if: runner.os == 'Linux'
        run: bun run lint:shell

      - name: PowerShell lint (PSScriptAnalyzer)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (-not (Get-PSRepository -Name PSGallery -ErrorAction SilentlyContinue)) {
            Register-PSRepository -Default
          }
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module PSScriptAnalyzer -Force -Scope CurrentUser -SkipPublisherCheck
          bun run lint:ps

  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: raven-actions/actionlint@v2

  # End-to-end check of the Windows daemon lifecycle: server.ts spawns a detached
  # daemon, waits for it to listen, syncs aliases, then stops it. COPILOT_API_ENTRY
  # points at a fake gateway (test/fake-gateway.mjs) so this needs no Copilot auth.
  windows-start-stop:
    name: windows start/stop
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          HUSKY: "0"
      - name: Start the daemon (fake gateway), verify it's up, then stop it
        shell: pwsh
        env:
          COPILOT_API_ENTRY: ${{ github.workspace }}/test/fake-gateway.mjs
        run: |
          bun src/server.ts start
          if ($LASTEXITCODE -ne 0) { Write-Error 'start failed'; exit 1 }
          bun src/server.ts stop
          if ($LASTEXITCODE -ne 0) { Write-Error 'stop failed'; exit 1 }
          Write-Host 'start/stop OK on Windows'
