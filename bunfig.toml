# Bun package-manager config for copilot-env.
#
# minimumReleaseAge is a package-manager safety net: bun will not resolve a
# dependency to a version published more recently than this many seconds ago
# unless a command explicitly overrides it.
#
# It only affects *resolution*, so it's a no-op under `--frozen-lockfile` (the
# reproducible baseline install). The proxy overlay in src/proxy_float.ts
# mirrors this release-age window from npm publish-time metadata.

[install]
minimumReleaseAge = 604800  # 7 days, in seconds

# Global test preload: hard-disables the Codex desktop-app patch so the suite never
# modifies a real installed /Applications/Codex.app (see test/setup.ts).
[test]
preload = ["./test/setup.ts"]
