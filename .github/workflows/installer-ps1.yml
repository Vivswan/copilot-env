name: installer-ps1 smoke

# Reusable, single-scenario install.ps1 smoke (Windows). The caller (ci.yml)
# invokes this once per flag combination, so each scenario runs as its OWN job on
# a fresh runner -- separate profile, separate $HOME. Scenarios can never share or
# clobber each other's state, so expect-wiring=false asserts the absence of
# profile wiring directly (a fresh profile has none to begin with).
on:
  workflow_call:
    inputs:
      args:
        description: Flag(s) to pass to install.ps1 (e.g. "-Cooldown").
        required: true
        type: string
      provision-bun:
        description: >-
          true installs bun via setup-bun before running (winget is unreliable in
          CI). false leaves bun ABSENT so -LocalInstall must install it via its
          irm installer -- pair with expect-bun-local.
        type: boolean
        default: true
      expect-clis:
        description: true asserts the agent CLIs (claude/copilot/codex) are installed afterward; false asserts they are ABSENT (e.g. -NoPrereqs must install nothing).
        type: boolean
        default: true
      expect-wiring:
        description: true asserts the profile wiring is present; false asserts it is absent.
        type: boolean
        default: true
      expect-bun-local:
        description: true asserts bun was installed user-locally (%USERPROFILE%\.bun), i.e. via irm not winget. Also pre-asserts bun is ABSENT before the install so the check isn't vacuous.
        type: boolean
        default: false
      rerun:
        description: >-
          true runs install.ps1 a SECOND time after the first, exercising the
          idempotent "everything already present" no-op path (must still exit 0).
          Same flag, same job -- no cross-scenario interference.
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  smoke:
    name: windows-latest
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - if: ${{ inputs.provision-bun }}
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      # For irm-bun scenarios bun must be ABSENT going in, or the post-run
      # user-local assertion is vacuous (e.g. a future runner image ships bun).
      - name: Assert bun absent before install
        if: ${{ inputs.expect-bun-local }}
        shell: pwsh
        run: |
          if (Get-Command bun -ErrorAction SilentlyContinue) {
            Write-Error "::error::bun is already on PATH before install; the user-local irm assertion would be vacuous"; exit 1
          }
          $bunExe = Join-Path $env:USERPROFILE '.bun\bin\bun.exe'
          if (Test-Path $bunExe) {
            Write-Error "::error::bun already present at $bunExe before install; the user-local irm assertion would be vacuous"; exit 1
          }
          Write-Host 'confirmed bun absent before install'

      - name: Run install.ps1 ${{ inputs.args }}
        shell: pwsh
        run: |
          ./install.ps1 ${{ inputs.args }}
          if ('${{ inputs.rerun }}' -eq 'true') {
            Write-Host '--- idempotency re-run (everything now present, must no-op) ---'
            ./install.ps1 ${{ inputs.args }}
          }

      - name: Verify install.ps1 outcome
        shell: pwsh
        run: |
          # npm is optional under -NoPrereqs, so don't hard-depend on it: probe the
          # npm global bin only when npm exists, otherwise rely on Get-Command.
          $bin = $null
          if (Get-Command npm.cmd -ErrorAction SilentlyContinue) {
            $bin = (& npm.cmd prefix -g).Trim()
          }
          foreach ($cli in 'claude', 'copilot', 'codex') {
            $found = [bool](Get-Command $cli -ErrorAction SilentlyContinue)
            if (-not $found -and $bin) {
              $found = (Test-Path (Join-Path $bin "$cli.cmd")) -or (Test-Path (Join-Path $bin $cli))
            }
            if ('${{ inputs.expect-clis }}' -eq 'true') {
              if (-not $found) { Write-Error "::error::$cli was not installed by install.ps1 ${{ inputs.args }}"; exit 1 }
              Write-Host "found $cli"
            } else {
              if ($found) { Write-Error "::error::$cli must NOT have been installed by install.ps1 ${{ inputs.args }}"; exit 1 }
              Write-Host "$cli correctly absent"
            }
          }
          $docs = [Environment]::GetFolderPath('MyDocuments')
          $profiles = @(
            (Join-Path $docs 'WindowsPowerShell\Microsoft.PowerShell_profile.ps1')
            (Join-Path $docs 'PowerShell\Microsoft.PowerShell_profile.ps1')
          )
          # install.ps1 keys its own "already wired" check on the agents.ps1 marker,
          # so the test asserts on the same marker the installer itself uses.
          $wired = [bool]($profiles | Where-Object { (Test-Path $_) -and (Select-String -Path $_ -SimpleMatch 'agents.ps1' -Quiet) })
          if ('${{ inputs.expect-wiring }}' -eq 'true') {
            if (-not $wired) { Write-Error "::error::expected profile wiring, but none found"; exit 1 }
          } else {
            if ($wired) { Write-Error "::error::expected NO profile wiring (${{ inputs.args }}), but a profile was wired"; exit 1 }
          }
          if ('${{ inputs.expect-bun-local }}' -eq 'true') {
            $bunExe = Join-Path $env:USERPROFILE '.bun\bin\bun.exe'
            if (-not (Test-Path $bunExe)) { Write-Error "::error::-LocalInstall did not install bun via irm ($bunExe missing)"; exit 1 }
            Write-Host "bun installed user-locally at $bunExe"
          }
          Write-Host "install.ps1 ${{ inputs.args }} verified"
